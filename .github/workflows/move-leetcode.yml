name: Move LeetCode Solutions

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    paths:
      - '[0-9][0-9][0-9][0-9]-*/**'

concurrency:
  group: move-leetcode-main
  cancel-in-progress: false

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move LeetCode solutions
        run: |
          echo "Current directory contents:"
          ls -la

          mkdir -p LeetCode

          found=0
          for d in [0-9][0-9][0-9][0-9]-*; do
            if [ -d "$d" ]; then
              found=1
              target="LeetCode/$d"

              if [ -d "$target" ]; then
                echo "Updating existing directory: $d -> $target"
                mkdir -p "$target"
                cp -a "$d"/. "$target"/
                rm -rf "$d"
              else
                echo "Moving new directory: $d -> LeetCode/"
                mv "$d" "LeetCode/"
              fi
            fi
          done

          if [ $found -eq 0 ]; then
            echo "No matching directories found to move"
          fi

      - name: Commit & Push changes
        run: |
          if git status --porcelain | grep .; then
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add -A
            git commit -m "chore: sync LeetCode solutions"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
